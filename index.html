<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Start</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-mode="work">
  <main class="app">
    <header class="header">
      <h1>Pomodoro</h1>
      <p class="session-count">Session <span id="session-number">1</span></p>
    </header>

    <nav class="mode-tabs" aria-label="Timer mode">
      <button type="button" class="mode-tab is-active" data-mode="work">Work</button>
      <button type="button" class="mode-tab" data-mode="shortBreak">Short Break</button>
      <button type="button" class="mode-tab" data-mode="longBreak">Long Break</button>
    </nav>

    <div class="timer" role="timer" aria-live="polite">
      <span id="minutes">25</span>:<span id="seconds">00</span>
    </div>

    <div class="controls">
      <button id="start-btn" type="button">Start</button>
      <button id="reset-btn" type="button" class="secondary">Reset</button>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="timer.js"></script>
  <script src="app.js"></script>
</body>
</html>
